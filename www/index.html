<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>VideoX — 极速播放器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ============ 页面一：视频浏览 ============ -->
<div id="page-browser" class="page active">

  <!-- 顶部栏 -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="app-logo">▶</span>
      <span class="app-name">VideoX</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="btn-nas" title="从 NAS 读取">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/>
          <circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="18" r="1" fill="currentColor"/>
        </svg>
        <span>NAS</span>
      </button>
    </div>
  </header>

  <!-- 快捷操作区 -->
  <div class="quick-actions">
    <button class="qa-btn qa-primary" id="btn-open-files">
      <span class="qa-icon">🎬</span>
      <span class="qa-label">打开视频</span>
      <span class="qa-desc">选择单个或多个视频文件</span>
    </button>
    <button class="qa-btn" id="btn-browse-folder">
      <span class="qa-icon">📁</span>
      <span class="qa-label">浏览文件夹</span>
      <span class="qa-desc">按目录交互式浏览视频</span>
    </button>
  </div>

  <!-- 统计 + 视图切换栏 -->
  <div class="stats-bar" id="stats-bar">
    <span class="stats-count" id="stats-count">未导入视频</span>
    <div class="stats-actions">
      <button class="icon-btn-sm" id="btn-view-flat" title="平铺视图">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <button class="icon-btn-sm" id="btn-view-tree" title="目录树视图">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/>
          <path d="M3 18h7v7H3z"/><path d="M14 18h7v7h-7z"/>
          <line x1="6.5" y1="10" x2="6.5" y2="14"/><line x1="6.5" y1="14" x2="17.5" y2="14"/>
          <line x1="17.5" y1="14" x2="17.5" y2="18"/>
        </svg>
      </button>
      <button class="icon-btn-sm" id="btn-toggle-hidden" title="显示/隐藏隐藏文件夹">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 多选操作栏 -->
  <div class="select-bar" id="select-bar">
    <button class="text-btn" id="btn-select-all">全选</button>
    <button class="text-btn" id="btn-select-invert">反选</button>
    <button class="text-btn" id="btn-select-cancel">取消</button>
    <button class="text-btn text-btn-danger" id="btn-select-delete">删除所选</button>
  </div>

  <!-- 路径面包屑（目录树视图用） -->
  <div class="breadcrumb" id="breadcrumb">
    <span class="bc-item active" data-path="root">📁 全部视频</span>
  </div>

  <!-- 空状态引导 -->
  <div class="empty-guide" id="empty-guide">
    <div class="empty-icon">🎬</div>
    <p class="empty-title">极速视频播放器</p>
    <p class="empty-desc">播放 · 快进 · 多倍速 · 横滑调进度</p>
    <p class="empty-desc-sub">支持 MP4 / MKV / AVI / RMVB / WMV / FLV 等所有格式</p>
  </div>

  <!-- 文件列表 -->
  <div class="file-list" id="file-list"></div>

  <!-- 隐藏的文件选择输入 -->
  <input type="file" id="file-input" multiple accept="video/*" style="display:none" />
  <input type="file" id="folder-input" webkitdirectory multiple style="display:none" />

</div>

<!-- ============ 页面二：播放器 ============ -->
<div id="page-player" class="page">

  <div class="video-wrap" id="video-wrap">
    <video id="main-video" playsinline preload="metadata"></video>

    <div class="center-tap" id="center-tap"></div>

    <div class="gesture-left" id="gesture-left">
      <div class="gesture-hint" id="hint-left">-10s</div>
    </div>
    <div class="gesture-right" id="gesture-right">
      <div class="gesture-hint" id="hint-right">+10s</div>
    </div>

    <div class="play-anim" id="play-anim">▶</div>

    <!-- 顶部控制栏 -->
    <div class="player-topbar" id="player-topbar">
      <button class="player-icon-btn" id="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="video-title" id="video-title">视频标题</span>

      <button class="player-icon-btn fit-btn" id="btn-fit" title="切换适应模式">
        <svg id="fit-icon-contain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="5" width="18" height="14" rx="1"/>
          <rect x="7" y="8" width="10" height="8" rx="0.5" fill="currentColor" opacity="0.4"/>
        </svg>
        <svg id="fit-icon-cover" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <rect x="3" y="5" width="18" height="14" rx="1" fill="currentColor" opacity="0.3"/>
          <rect x="3" y="5" width="18" height="14" rx="1"/>
        </svg>
        <svg id="fit-icon-rotate" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M20 7l-3-3-3 3"/><path d="M17 4v7a4 4 0 01-4 4H6"/>
          <path d="M4 17l3 3 3-3"/><path d="M7 20v-7a4 4 0 014-4h7"/>
        </svg>
        <span id="fit-label">适应</span>
      </button>

      <button class="player-icon-btn cast-btn" id="btn-cast" title="投屏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 8.5V6a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2H8.5"/>
          <path d="M2 14.5A5.5 5.5 0 017.5 20"/><path d="M2 11a9 9 0 019 9"/>
          <circle cx="2" cy="20" r="1" fill="currentColor"/>
        </svg>
        <span class="cast-label" id="cast-label">投屏</span>
      </button>
    </div>

    <div class="video-orient-badge" id="orient-badge">横屏 16:9</div>

    <div class="orientation-bar" id="orientation-bar">
      <span id="orientation-bar-text">适应模式：保留黑边</span>
    </div>

    <!-- 底部控制栏 -->
    <div class="player-controls" id="player-controls">
      <div class="progress-wrap">
        <span class="time-cur" id="time-cur">0:00</span>
        <div class="progress-bar-bg" id="progress-bg">
          <div class="progress-bar-buf" id="progress-buf"></div>
          <div class="progress-bar-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <span class="time-total" id="time-total">0:00</span>
      </div>

      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-skip-back">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          <span>-10s</span>
        </button>
        <button class="ctrl-btn" id="btn-play-pause">
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-skip-fwd">
          <span>+10s</span>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-12h2v12H8z"/></svg>
        </button>
        <button class="ctrl-btn speed-btn" id="btn-speed">
          <span id="speed-label">1×</span>
        </button>
        <button class="ctrl-btn" id="btn-fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 倍速面板 -->
  <div class="speed-panel" id="speed-panel">
    <div class="speed-title">播放速度</div>
    <div class="speed-options" id="speed-options">
      <button class="speed-opt" data-speed="0.5">0.5×</button>
      <button class="speed-opt" data-speed="0.75">0.75×</button>
      <button class="speed-opt active" data-speed="1">1×</button>
      <button class="speed-opt" data-speed="1.25">1.25×</button>
      <button class="speed-opt" data-speed="1.5">1.5×</button>
      <button class="speed-opt" data-speed="2">2×</button>
      <button class="speed-opt" data-speed="3">3×</button>
      <button class="speed-opt" data-speed="4">4×</button>
      <button class="speed-opt" data-speed="6">6×</button>
    </div>
  </div>

  <!-- 投屏面板 -->
  <div class="cast-panel" id="cast-panel">
    <div class="cast-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path d="M2 8.5V6a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2H8.5"/>
        <path d="M2 14.5A5.5 5.5 0 017.5 20"/><path d="M2 11a9 9 0 019 9"/>
        <circle cx="2" cy="20" r="1" fill="currentColor"/>
      </svg>
      投屏到设备
    </div>
    <div class="cast-scan">
      <div class="cast-scanning" id="cast-scanning">
        <div class="scan-dot"></div><span>正在搜索设备...</span>
      </div>
    </div>
    <div class="cast-devices" id="cast-devices"></div>
    <button class="btn-close-panel" id="btn-close-cast">关闭</button>
  </div>

  <!-- 播放列表 -->
  <div class="playlist-sidebar" id="playlist-sidebar">
    <div class="playlist-header">
      <span>播放列表</span>
      <button class="icon-btn" id="btn-close-playlist">✕</button>
    </div>
    <div class="playlist-items" id="playlist-items"></div>
  </div>

</div>

<!-- 遮罩层 -->
<div class="overlay" id="overlay"></div>

<script src="app.js"></script>
</body>
</html>
